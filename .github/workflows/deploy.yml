name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Set up Node ⚙️
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      # APP_SCRIPT_URL secret = Google Apps Script web app URL (same as .env.local) so contact form works on GitHub Pages
      - name: Install and Build 🔧
        env:
          VITE_APP_SCRIPT_URL: ${{ secrets.APP_SCRIPT_URL }}
        run: |
          npm install
          npm run build

      - name: Setup Pages ⚙️
        uses: actions/configure-pages@v4

      - name: Upload artifact 🚀
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Deploy to GitHub Pages 🚀
        id: deployment
        uses: actions/deploy-pages@v4
